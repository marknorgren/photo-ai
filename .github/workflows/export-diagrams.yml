name: Export Excalidraw Diagrams

on:
  push:
    paths:
      - 'diagrams/*.excalidraw'
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Export diagrams to SVG
        run: npm run export-diagrams

      - name: Commit SVGs if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add diagrams/*.svg
          git diff --cached --quiet || git commit -m "chore: export excalidraw diagrams to SVG"
          git push
